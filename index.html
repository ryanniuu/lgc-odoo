<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Markdown Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        .file-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen text-gray-900">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 mb-2">
                📖 Repo Index
            </h1>
            <p class="text-lg text-gray-600">Dynamic Markdown file listing for your GitHub Pages site.</p>
        </header>

        <!-- Configuration Panel -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">GitHub Username</label>
                    <input type="text" id="username" placeholder="e.g. octocat" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Repository Name</label>
                    <input type="text" id="repo" placeholder="e.g. my-project" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>
                <div class="flex items-end">
                    <button onclick="fetchFiles()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 shadow-sm">
                        Load Files
                    </button>
                </div>
            </div>
            <p class="mt-4 text-sm text-gray-500 italic">
                Tip: Edit the <code>CONFIG</code> object in the script to hardcode your details.
            </p>
        </div>

        <!-- Search Bar -->
        <div id="search-container" class="hidden mb-6">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </span>
                <input type="text" id="search" oninput="filterFiles()" placeholder="Filter markdown files..." 
                    class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <!-- Status Messages -->
        <div id="status" class="hidden text-center p-8">
            <div id="loading" class="hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-600">Scanning repository...</p>
            </div>
            <div id="error" class="hidden bg-red-50 text-red-700 p-4 rounded-lg border border-red-100"></div>
        </div>

        <!-- File List -->
        <div id="file-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Dynamic items go here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20">
            <div class="text-6xl mb-4 text-gray-300">📂</div>
            <p class="text-gray-500">No Markdown files found in the root of this repository.</p>
        </div>
    </div>

    <script>
        // --- STATIC CONFIGURATION ---
        // Fill these out to hardcode your repository for production
        const CONFIG = {
            username: "ryanniuu", // e.g. "octocat"
            repo: "lgc-odoo"      // e.g. "my-project"
        };

        let allFiles = [];

        // Auto-fill from CONFIG or URL params
        window.onload = () => {
            const usernameInput = document.getElementById('username');
            const repoInput = document.getElementById('repo');

            // 1. Check URL params first
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('user')) usernameInput.value = urlParams.get('user');
            if (urlParams.has('repo')) repoInput.value = urlParams.get('repo');
            
            // 2. Fallback to Static Config if inputs still empty
            if (!usernameInput.value && CONFIG.username) usernameInput.value = CONFIG.username;
            if (!repoInput.value && CONFIG.repo) repoInput.value = CONFIG.repo;

            // Auto-load if we have both values
            if (usernameInput.value && repoInput.value) {
                fetchFiles();
            }
        };

        async function fetchFiles() {
            const username = document.getElementById('username').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const listContainer = document.getElementById('file-list');
            const status = document.getElementById('status');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const searchContainer = document.getElementById('search-container');
            const emptyState = document.getElementById('empty-state');

            if (!username || !repo) {
                showMessage("Please enter both username and repository name.", "error");
                return;
            }

            // Reset UI
            listContainer.innerHTML = '';
            status.classList.remove('hidden');
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            searchContainer.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                // Fetch contents of the root directory
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                
                if (!response.ok) {
                    if (response.status === 404) throw new Error("Repository not found. Check your spelling or visibility (must be public).");
                    if (response.status === 403) throw new Error("GitHub API rate limit exceeded. Please try again later.");
                    throw new Error("Failed to fetch repository data.");
                }

                const data = await response.json();
                
                // Filter for Markdown files
                allFiles = data.filter(item => 
                    item.type === 'file' && 
                    (item.name.toLowerCase().endsWith('.md') || item.name.toLowerCase().endsWith('.markdown'))
                ).map(file => ({
                    name: file.name,
                    path: file.path,
                    url: `https://${username}.github.io/${repo}/${file.path.replace(/\.md$/, '.html')}`,
                    githubUrl: file.html_url,
                    size: (file.size / 1024).toFixed(1)
                }));

                loading.classList.add('hidden');
                status.classList.add('hidden');

                if (allFiles.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    searchContainer.classList.remove('hidden');
                    renderFiles(allFiles);
                }

            } catch (err) {
                loading.classList.add('hidden');
                showMessage(err.message, "error");
            }
        }

        function renderFiles(files) {
            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = files.map(file => `
                <div class="file-card bg-white p-5 rounded-xl border border-gray-200 transition-all duration-200 flex flex-col justify-between">
                    <div>
                        <div class="flex items-start justify-between mb-2">
                            <span class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                            </span>
                            <span class="text-xs font-medium text-gray-400">${file.size} KB</span>
                        </div>
                        <h3 class="font-bold text-gray-800 text-lg mb-1 truncate" title="${file.name}">
                            ${file.name.replace(/\.md$/, '')}
                        </h3>
                        <p class="text-sm text-gray-500 mb-4 truncate">${file.path}</p>
                    </div>
                    
                    <div class="flex gap-2 mt-auto">
                        <a href="${file.url}" target="_blank" 
                           class="flex-1 text-center bg-gray-50 hover:bg-blue-50 hover:text-blue-700 text-gray-700 text-sm font-semibold py-2 px-3 rounded-lg transition">
                            View Page
                        </a>
                        <a href="${file.githubUrl}" target="_blank" 
                           class="text-gray-400 hover:text-gray-900 p-2 transition" title="View Source on GitHub">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                            </svg>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function filterFiles() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query));
            renderFiles(filtered);
        }

        function showMessage(msg, type) {
            const error = document.getElementById('error');
            const status = document.getElementById('status');
            status.classList.remove('hidden');
            error.classList.remove('hidden');
            error.innerText = msg;
        }
    </script>
</body>
</html>
